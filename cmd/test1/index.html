<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Chunk Upload</title>
</head>

<body>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>
<div id="progressBar" style="width: 300px; height: 20px; border: 1px solid #ccc;"></div>
<div id="progressText"></div>

<script>
    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    async function uploadFile() {
        const file = fileInput.files[0];
        if (!file) {
            alert('Please select a file.');
            return;
        }

        const chunkSize = 1024 * 1024; // 1MB
        const totalChunks = Math.ceil(file.size / chunkSize);
        const fileId = Date.now().toString();

        let uploadedChunks = 0;

        for (let i = 0; i < totalChunks; i++) {
            const start = i * chunkSize;
            const end = Math.min(start + chunkSize, file.size);
            const chunk = file.slice(start, end);

            const formData = new FormData();
            formData.append('chunk', chunk);
            formData.append('fileId', fileId);
            formData.append('chunkIndex', i);
            formData.append('originalFileName', file.name);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                uploadedChunks++;
                const progress = (uploadedChunks / totalChunks) * 100;
                progressBar.style.width = `${progress}%`;
                progressText.textContent = `${Math.round(progress)}%`;
            } else {
                alert('Error uploading chunk');
                return;
            }
        }

        // 合并分片
        const mergeData = new FormData();
        mergeData.append('fileId', fileId);
        mergeData.append('totalChunks', totalChunks);
        mergeData.append('originalFileName', file.name);

        const mergeResponse = await fetch('/merge', {
            method: 'POST',
            body: mergeData
        });

        if (mergeResponse.ok) {
            alert('File uploaded and merged successfully');
        } else {
            alert('Error merging file');
        }
    }
</script>
</body>

</html>
