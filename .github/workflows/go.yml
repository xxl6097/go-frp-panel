name: Go Multi-Platform Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for Multiple Platforms
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build the binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output_name="your_app_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name="${output_name}.exe"
          fi
          go build -o $output_name .
          echo "OUTPUT_NAME=$output_name" >> $GITHUB_ENV

      - name: Package the binary
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            7z a -tzip ${{ env.OUTPUT_NAME }}.zip ${{ env.OUTPUT_NAME }}
            echo "PACKAGE_NAME=${{ env.OUTPUT_NAME }}.zip" >> $GITHUB_ENV
          else
            tar -czvf ${{ env.OUTPUT_NAME }}.tar.gz ${{ env.OUTPUT_NAME }}
            echo "PACKAGE_NAME=${{ env.OUTPUT_NAME }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_NAME }}

  release:
    name: Create and Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            This release contains builds for multiple platforms.
            - Linux (amd64, arm64)
            - Windows (amd64, arm64)
            - macOS (amd64, arm64)
          draft: false
          prerelease: false

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in artifacts/*/*; do
            asset_name=$(basename $file)
            upload_url="${{ steps.create_release.outputs.upload_url }}?name=$asset_name"
            curl -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "$upload_url"
          done
